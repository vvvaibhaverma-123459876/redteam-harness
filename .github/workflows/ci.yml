name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -q --cov=redteam_harness --cov-report=term-missing

      - name: Verify CLI entry point
        run: |
          python -m redteam_harness --help

      - name: Safety gate (defended mock must clear 95%)
        run: |
          python -m redteam_harness run --provider mock --defense --fail-under 0.95
